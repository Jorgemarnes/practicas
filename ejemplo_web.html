<html>
    <head>
        <title>Prueba</title>
        <meta charset="UTF-8"/>
        <style>
            body {
                display: flex;
                background-color: rgb(0, 0, 0);
                background-image: url("./foto.jpg");
                background-repeat: no-repeat;
                background-size: 100vw 100vh;

                justify-content: center;
                align-items: center;
            }
            #cabecera {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            img {
                max-width: 1000px;
                border-radius: 5mm;
                width: 70vw;
                border-bottom-left-radius: 0mm;
                border-bottom-right-radius: 0mm;
            }
            #titulo {
                max-width: 1000px;
                width: 70vw;
                display: flex;
                justify-content: center;
                align-items: center;
                display: grid;
                grid-template-columns: 50% 50%;
                background-color: rgb(213, 226, 226);
                border-radius: 5mm;
                border-top-left-radius: 0mm;
                border-top-right-radius: 0mm;
            }
            #titulo_info {
                margin-left: 10px;
            }
            #entradas {
                padding-right: 5px;
                max-height: 50%;
                max-width: 80%;
                background-color: cadetblue;
                border-radius: 5mm;
                border: 0px;
                font-weight: bold;
                font-size: 40px;
                color: white;

            }
            h5 {
                font-size: large;
                font-weight: bold;
            }
            #ubicacion {
                opacity: 60%;
                color: black;
            }


        </style>
    </head>
    <body>
        <div id="cartel">
            <div id="cabecera">
                <img src="./foto.jpg" alt='Portada de "El postre"'>
            </div>
            <div id="titulo">
                <div id="titulo_info">
                    <h1>21 de mayo</h1>
                    <h4>El postre - del Taller de Interpretación ante la Cámara</h4>
                    <p id="ubicacion">Teatro Cine Realejos<br/>Los Realejos</p>
                    <p>Gratuito</p>
                </div>
                <button id="entradas" href="">Entradas</button>
            </div>
            <div id="info"></div>
        </div>
    </body> 
</html>
